<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Information</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 30px 20px;
            text-align: center;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #2b5876;
        }

        .name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 25px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            font-size: 0.95rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }

        .btn-link i {
            font-size: 1.2rem;
            width: 30px;
            text-align: center;
            margin-right: 12px;
        }

        .phone { background-color: #2e7d32; }
        .email { background-color: #d93025; }
        .line { background-color: #06c755; }
        .facebook { background-color: #1877f2; }
        .youtube { background-color: #ff0000; } /* ปรับเป็นสีแดง YouTube */

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <!-- profile photo -->
        <img src="bunyong.png" alt="Assoc. Prof. Dr. Bunyong Rungroungdouyboon" class="profile-img">

        <!-- Name information -->
        <h1 class="name">Assoc. Prof. Dr. Bunyong Rungroungdouyboon</h1>
        <p class="title">Mechanical Engineering / Thammasat</p>

        <!-- Contact -->
        <div class="links-container">
            <!-- Telephone number -->
            <a href="tel:0898154728" class="btn-link phone">
                <i class="fa-solid fa-phone"></i> Tel: 089-815-4728
            </a>

            <!-- Email -->
            <a href="mailto:rbunyong@engr.tu.ac.th" class="btn-link email">
                <i class="fa-solid fa-envelope"></i> Email
            </a>

            <!-- Line -->
            <a href="https://line.me/R/ti/p/phone/66898154728" target="_blank" class="btn-link line">
                <i class="fa-brands fa-line"></i> LINE Official / ID
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/ceddlab/?locale=th_TH" target="_blank" class="btn-link facebook">
                <i class="fa-brands fa-facebook"></i> Facebook (CEDD Lab)
            </a>

            <!-- Youtube -->
            <a href="https://www.youtube.com/@ced2thammasatuniversity744" target="_blank" class="btn-link youtube">
                <i class="fa-brands fa-youtube"></i> YouTube
            </a>
        </div>

        <div class="footer">
            Scan to Connect
        </div>
    </div>

</body>
</html>
